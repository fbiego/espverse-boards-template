; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
; uncomment only one
; default_envs = elecrow-c3-128 


[env]
lib_deps = 
	lvgl/lvgl@9.5.0
    fbiego/Timber@2.0.0
	
build_flags = 
    -I include
	-D LV_CONF_SKIP
    -D LV_CONF_INCLUDE_SIMPLE
	-D LV_LVGL_H_INCLUDE_SIMPLE=1
	-D LV_USE_OBJ_NAME=1
	-D LV_USE_STDLIB_MALLOC=LV_STDLIB_CLIB

    -D LV_USE_OS=LV_OS_CUSTOM
    -D LV_OS_CUSTOM_INCLUDE=\"os/lv_os_custom.h\"


[esp32]
platform = espressif32@6.9.0
framework = arduino
extra_scripts = 
	pre:scripts/board_profile_deps.py
	scripts/build_firmware.py
lib_deps = 
	${env.lib_deps}
	lovyan03/LovyanGFX@1.1.16
build_flags = 
	${env.build_flags}

	

; ELECROW C3 LCD 1.28
[env:elecrow-c3-128]
extends = esp32
board = lolin_c3_mini
board_build.partitions = partitions/partition.csv
lib_deps = 
	${esp32.lib_deps}
	makuna/RTC@2.4.3
build_flags = 
	${esp32.build_flags}
	-D BOARD_PROFILE_INCLUDE=\"boards/elecrow-c3-128.hpp\"

; Viewe SmartRing 466x466 AMOLED 
[env:viewe-smartring]
extends = esp32
board = lolin_s3_pro
board_build.partitions = partitions/partition_16M.csv
lib_deps = 
	${esp32.lib_deps}
	moononournation/GFX Library for Arduino@1.5.7
	lewisxhe/SensorLib@0.3.1
	FastIMU=https://github.com/LiquidCGS/FastIMU/archive/refs/tags/1.2.6.zip
build_flags = 
	${esp32.build_flags}
	-D BOARD_PROFILE_INCLUDE=\"boards/viewe-smartring.hpp\"
	-D ARDUINO_USB_CDC_ON_BOOT=1

